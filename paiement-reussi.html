<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Paiement confirmé | Efficia Digital</title>
  <meta name="description" content="Votre paiement Efficia Digital a bien été confirmé." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" href="assets/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">

  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 18%, rgba(37, 99, 235, 0.1), transparent 34%),
        #f8fbff;
    }

    .success-page {
      min-height: calc(100vh - 76px);
      display: grid;
      place-items: center;
      padding: 120px 20px 90px;
    }

    .success-card {
      width: min(100%, 720px);
      padding: 56px;
      border: 1px solid #e2e8f0;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 30px 90px rgba(15, 23, 42, 0.09);
      text-align: center;
    }

    .success-icon {
      width: 68px;
      height: 68px;
      display: grid;
      place-items: center;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: #eef8f1;
      color: #3a7a4b;
      font-size: 34px;
      font-weight: 800;
    }

    .success-card h1 {
      color: var(--navy);
      font-size: clamp(34px, 4vw, 52px);
      line-height: 1.05;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .success-card p {
      max-width: 560px;
      margin: 22px auto 0;
      color: #64748b;
      font-size: 18px;
      line-height: 1.75;
      font-weight: 700;
    }

    .success-card .btn {
      margin-top: 34px;
    }

    @media (max-width: 640px) {
      .success-card {
        padding: 38px 24px;
        border-radius: 26px;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="Efficia Digital">
        <img src="assets/logo/logo-efficia-web.png" alt="Efficia Digital">
      </a>
    </div>
  </header>

  <main class="success-page">
    <section class="success-card" aria-labelledby="success-title">
      <div class="success-icon" aria-hidden="true">✓</div>
      <h1 id="success-title">Merci, votre paiement a bien été confirmé.</h1>
      <p>Nous avons bien reçu votre commande. Vous recevrez prochainement un e-mail avec les prochaines étapes.</p>
      <a href="/" class="btn btn-primary">Retour à l’accueil</a>
    </section>
  </main>
</body>
</html>
